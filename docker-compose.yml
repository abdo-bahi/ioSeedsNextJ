# docker-compose.yml
# Self-hosted local stack: PostgreSQL + TimescaleDB + Mosquitto

services:

  # ── PostgreSQL with TimescaleDB ──────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: irrigation_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       irrigation
      POSTGRES_USER:     irrigation_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irrigation_user -d irrigation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT Broker ────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: irrigation_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (optional, for browser MQTT clients)
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./docker/mosquitto_passwd:/mosquitto/config/passwd
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t test -m ping -u ${MQTT_USER:-admin} -P ${MQTT_PASSWORD:-changeme} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  mosquitto_data:
  mosquitto_logs:
